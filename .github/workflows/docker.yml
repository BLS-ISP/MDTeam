name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build & Push Workspace Web Client ---
      - name: Extract metadata (tags, labels) for Web Client
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/workspace-web
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Web Client Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}

      # --- Build & Push Yjs Collaboration Server ---
      - name: Extract metadata (tags, labels) for Yjs Server
        id: meta-yjs
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/yjs-server
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Yjs Server Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.yjs
          push: true
          tags: ${{ steps.meta-yjs.outputs.tags }}
          labels: ${{ steps.meta-yjs.outputs.labels }}
